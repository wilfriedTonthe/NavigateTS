include:
  - project: 'edgeaeye/cicd'
    file: '/.ci-common.yml'

default:
  tags:
    - oran-runner

variables:
  GROUP_NAME: edgeaeye
  IMAGE_NAME: $REGISTRY_URL/$GROUP_NAME/$CI_PROJECT_NAME

stages:
  - environment
  - build
  - test
  - internal
  - alpha
  - beta
  - production

.updateContainerJob:
  extends: .build_template
  stage: environment

updateContainer:
  extends: .updateContainerJob
  only:
    changes:
      - Containerfile

ensureContainer:
  extends: .updateContainerJob
  allow_failure: true
  before_script:
    - podman info
    - podman manifest inspect $IMAGE_NAME:$CI_COMMIT_SHORT_SHA > /dev/null && exit || true
    - sleep 5
    - mkdir -p /etc/containers/certs.d/$REGISTRY_URL
    - echo "$REGISTRY_CERTIFICATE" > /etc/containers/certs.d/$REGISTRY_URL/ca.crt
    - update-ca-trust
  except:
    changes:
      - Containerfile
  only:
    - branches
    - merge_requests

.build_job:
  image: $IMAGE_NAME:$CI_COMMIT_SHORT_SHA
  stage: build
  before_script:
    - chmod +x gradlew
    - "export VERSION_CODE=$(($CI_PIPELINE_IID)) && echo $VERSION_CODE"
    - "export VERSION_SHA=echo ${CI_COMMIT_SHA:0:8} && echo $VERSION_SHA"
  artifacts:
    paths:
      - app/build/outputs

buildDebug:
  extends: .build_job
  script:
    - chmod +x gradlew
    - ./gradlew --refresh-dependencies
    - bundle exec fastlane buildDebug

buildRelease:
  extends: .build_job
  script:
    - chmod +x gradlew
    - ./gradlew --refresh-dependencies
    - bundle exec fastlane buildRelease
  environment:
    name: production

testDebug:
  image: $IMAGE_NAME:$CI_COMMIT_SHORT_SHA
  stage: test
  dependencies:
    - buildDebug
  script:
    - chmod +x gradlew
    - bundle exec fastlane test

.promote_job:
  image: $IMAGE_NAME:$CI_COMMIT_SHORT_SHA
  when: manual
  dependencies: [ ]
  before_script:
    - |
      if [ ! -f ~/google_play_api_key.json ]; then
        echo "=========================================="
        echo "ERREUR: Fichier google_play_api_key.json manquant"
        echo "Veuillez consulter le README.md du projet"
        echo "=========================================="
        exit 1
      fi
    - chmod +x gradlew
  after_script:
    - rm -f ~/google_play_api_key.json

publishInternal:
  extends: .promote_job
  image: $IMAGE_NAME:$CI_COMMIT_SHORT_SHA
  stage: internal
  dependencies:
    - buildRelease
  when: manual
  script:
    - bundle exec fastlane internal

promoteAlpha:
  extends: .promote_job
  stage: alpha
  script:
    - bundle exec fastlane promote_internal_to_alpha

promoteBeta:
  extends: .promote_job
  stage: beta
  script:
    - bundle exec fastlane promote_alpha_to_beta

promoteProduction:
  extends: .promote_job
  stage: production
  only:
    - master
  script:
    - bundle exec fastlane promote_beta_to_production
